name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build
      - run: npm audit --audit-level=high

  # backend job (gofmt · golangci-lint · go test · govulncheck · docker build)
  # lands with the Go scaffold — see docs/DEPLOYMENT.md §2 and ROADMAP.md Phase 0.
